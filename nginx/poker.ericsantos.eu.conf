# ---- poker.ericsantos.eu ----
# App Go com WebSocket → porta 3001

server {
    listen 443 ssl;
    server_name poker.ericsantos.eu;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/poker.ericsantos.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poker.ericsantos.eu/privkey.pem;
}

server {
    listen 80;
    server_name poker.ericsantos.eu;

    if ($host = poker.ericsantos.eu) { return 301 https://$host$request_uri; }

    return 404;
}
