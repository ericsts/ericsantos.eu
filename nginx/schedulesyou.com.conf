# ---- schedulesyou.com ----
# Domínio próprio (NÃO é subdomínio de ericsantos.eu) — SaaS Laravel com
# tenants dinâmicos por subdomínio (ex: empresa.schedulesyou.com).
# nginx dentro do container (porta 8010) resolve assets/API internamente.
#
# ATENÇÃO — certificado wildcard:
# *.schedulesyou.com exige validação DNS-01 (HTTP-01 não cobre wildcard),
# então "certbot --nginx -d ..." sozinho NÃO funciona aqui. O DNS desse
# domínio está na GoDaddy hoje, que não tem plugin oficial do certbot.
# Duas opções, nenhuma delas aplicada ainda (decisão futura):
#   a) migrar o DNS do domínio pra Cloudflare (grátis) e usar
#      certbot-dns-cloudflare — caminho recomendado, renovação automática;
#   b) usar o plugin comunitário certbot-dns-godaddy (menos mantido).
# Até resolver isso, comente o bloco 443 e suba só em HTTP, ou gere o
# certificado manualmente com --manual --preferred-challenges dns (renovação
# manual a cada 90 dias) como solução temporária.

server {
    listen 443 ssl;
    server_name schedulesyou.com *.schedulesyou.com;

    location / {
        proxy_pass       http://127.0.0.1:8010;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ssl_certificate     /etc/letsencrypt/live/schedulesyou.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schedulesyou.com/privkey.pem;
}

server {
    listen 80;
    server_name schedulesyou.com *.schedulesyou.com;

    return 301 https://$host$request_uri;
}
