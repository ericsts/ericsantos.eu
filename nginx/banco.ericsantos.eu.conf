# ---- banco.ericsantos.eu ----
# Frontend (nginx dentro do container) → porta 8090
# Backend FastAPI só é acessível internamente pelo container frontend
#
# Primeiro deploy — rode no servidor antes de habilitar este arquivo:
#   sudo certbot --nginx -d banco.ericsantos.eu

server {
    listen 443 ssl;
    server_name banco.ericsantos.eu;

    client_max_body_size 25m;   # upload de PDFs/extratos

    location / {
        proxy_pass       http://127.0.0.1:8090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/banco.ericsantos.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/banco.ericsantos.eu/privkey.pem;
}

server {
    listen 80;
    server_name banco.ericsantos.eu;

    if ($host = banco.ericsantos.eu) { return 301 https://$host$request_uri; }

    return 404;
}
