# ---- battleship.ericsantos.eu ----
# App Go (estático + WebSocket) → porta 8082
#
# Primeiro deploy — rode no servidor antes de habilitar este arquivo:
#   sudo certbot --nginx -d battleship.ericsantos.eu

server {
    listen 443 ssl;
    server_name battleship.ericsantos.eu;

    # Arquivos estáticos + rotas HTTP (lobby, create, game/*)
    location / {
        proxy_pass       http://127.0.0.1:8082;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — partidas em tempo real
    location /ws/ {
        proxy_pass         http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/battleship.ericsantos.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/battleship.ericsantos.eu/privkey.pem;
}

server {
    listen 80;
    server_name battleship.ericsantos.eu;

    if ($host = battleship.ericsantos.eu) { return 301 https://$host$request_uri; }

    return 404;
}
