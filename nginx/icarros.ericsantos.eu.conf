# ---- icarros.ericsantos.eu ----
# Frontend Vue → porta 3000 | API Go → porta 8080

server {
    listen 443 ssl;
    server_name icarros.ericsantos.eu;

    # Frontend Vue (container Docker porta 3000)
    location / {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Go (container Docker porta 8080)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — lances em tempo real
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/ericsantos.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ericsantos.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name icarros.ericsantos.eu;

    if ($host = icarros.ericsantos.eu) { return 301 https://$host$request_uri; }

    return 404;
}
